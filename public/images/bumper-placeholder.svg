<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="bumperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#adb5bd"/>
      <stop offset="100%" style="stop-color:#868e96"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="8"/>

  <!-- Bumper illustration - front bumper shape -->
  <g transform="translate(200, 140)">
    <!-- Main bumper body -->
    <path d="M-120,-20 Q-130,-20 -135,-10 L-140,10 Q-140,20 -130,25 L-100,30 Q-60,35 0,35 Q60,35 100,30 L130,25 Q140,20 140,10 L135,-10 Q130,-20 120,-20 Z"
          fill="url(#bumperGrad)" stroke="#6c757d" stroke-width="1.5" opacity="0.7"/>

    <!-- Bumper lower lip -->
    <path d="M-100,30 Q-60,40 0,42 Q60,40 100,30 L95,38 Q60,48 0,50 Q-60,48 -95,38 Z"
          fill="#868e96" stroke="#6c757d" stroke-width="1" opacity="0.5"/>

    <!-- Grille lines -->
    <line x1="-80" y1="-5" x2="80" y2="-5" stroke="#6c757d" stroke-width="1" opacity="0.3"/>
    <line x1="-75" y1="5" x2="75" y2="5" stroke="#6c757d" stroke-width="1" opacity="0.3"/>
    <line x1="-70" y1="15" x2="70" y2="15" stroke="#6c757d" stroke-width="1" opacity="0.3"/>

    <!-- Fog light cutouts -->
    <ellipse cx="-95" cy="5" rx="18" ry="12" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="0.6"/>
    <ellipse cx="95" cy="5" rx="18" ry="12" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- DTM Logo text -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" opacity="0.6" letter-spacing="4">DTM</text>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#868e96" letter-spacing="2">PARTS</text>

  <!-- Subtitle -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#adb5bd">התמונה בקרוב</text>
</svg>
